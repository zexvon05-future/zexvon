<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZEXVON | Aura Ring</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#05070d;
color:white;
text-align:center;
overflow-x:hidden;
}

header{
padding:20px;
}

.logo{
width:180px;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.hero h1{
font-size:55px;
margin-top:20px;
}

.hero p{
color:#9cb3d6;
margin:20px 0;
font-size:18px;
}

.ring{
width:350px;
max-width:90%;
filter:drop-shadow(0 0 40px #00aaff);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-18px);
}
}

button{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:#00aaff;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0088dd;
}

footer{
padding:40px;
color:gray;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

</header>

<section class="hero">

<h1>ZEXVON AURA RING</h1>

<p>Turning Ideas Into Reality</p>

<img src="ring.png" class="ring">

<button>COMING SOON</button>

</section>

<footer>

© 2026 ZEXVON

</footer>

</body>
</html>
